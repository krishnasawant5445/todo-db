<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e54c8,#8f94fb,#ff6ec7);
    background-size:300% 300%;
    animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

.container{
    width:500px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 10px 40px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
    font-size:40px;
    letter-spacing:2px;
    text-shadow:0 0 15px #fff;
}

/* Form */

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input[type="text"]{
    padding:14px;
    border:none;
    border-radius:50px;
    outline:none;
    background:rgba(255,255,255,.25);
    color:white;
    font-size:16px;
}

input[type="text"]::placeholder{
    color:#eee;
}

input[type="submit"]{
    padding:14px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#00f5ff,#00ff87);
    color:#222;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
}

input[type="submit"]:hover{
    transform:translateY(-4px);
    box-shadow:0 0 20px cyan;
}

/* Todo List */

ul{
    list-style:none;
    margin-top:25px;
}

li{
    background:rgba(255,255,255,.18);
    border-left:6px solid #00ffea;
    margin-bottom:18px;
    padding:18px;
    border-radius:18px;
    transition:.4s;
    color:white;
    position:relative;
}

li:hover{
    transform:translateX(10px) scale(1.02);
    box-shadow:0 0 20px rgba(0,255,255,.4);
}

li h2{
    font-size:22px;
    margin-bottom:8px;
}

li p{
    font-size:14px;
    color:#f1f1f1;
}

/* Checkbox */

input[type="checkbox"]{
    width:22px;
    height:22px;
    accent-color:#00ff87;
    cursor:pointer;
    margin-top:12px;
}

/* Delete Button */

button{
    position:absolute;
    right:20px;
    bottom:15px;
    border:none;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(90deg,#ff416c,#ff4b2b);
    color:white;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 15px #ff416c;
}

/* Scroll */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#00f5ff;
    border-radius:20px;
}
    </style>

</head>
<body>

    <h1>Todo App</h1>

    <form action="/add" method="post">
        <input type="text" name="todo" placeholder="Enter task">
        <input type="text" name="des"  placeholder="Enter description">
        <input type="submit">
    </form>

    <ul>
        {% for element in todo %}

        <li>
            <h2>{{element.task}}</h2>
            <p>{{element.des}}</p>

            <input type="checkbox" {% if element.is_done %} checked {% endif %}
                onchange="window.location.href='/update/{{element.id}}'">

            <form action="/delete/{{ element.id }}" method="post">
                <button type="submit">Delete</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    
</body>
</html>
